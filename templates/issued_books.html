<!DOCTYPE html> 
<html>
<head>
    <title>Issued Books</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='issued_books.css') }}">
</head>
<body>
    <div class="container">
        <h1>Issued Books</h1>
        <a class="back-btn" href="{{ url_for('admin_dashboard') }}">Back to Dashboard</a>

        <table>
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Author</th>
                    <th>Issued To</th>
                    <th>Issue Date</th>
                </tr>
            </thead>
            <tbody>
                {% for book in books %}
                <tr>
                    <td>{{ book.title }}</td>
                    <td>{{ book.author }}</td>
                    <td>{{ book.issued_to }}</td>
                    <td>{{ book.issue_date }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
