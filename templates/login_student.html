<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='login_student.css') }}">
</head>
<body>
    <div class="container">
        <h1>🎓 Student Login</h1>
        <form action="{{ url_for('login_student') }}" method="post">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <a href="{{ url_for('login_admin') }}">Admin Login</a>
    </div>
</body>
</html>
